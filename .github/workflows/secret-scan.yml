name: Secret scan

on:
  push:
  pull_request:

# Read-only token is all this needs — the scan runs against the checked-out repo,
# not the GitHub API.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the scan covers every commit, not just the latest.
          fetch-depth: 0

      # The gitleaks marketplace action calls the GitHub API (to read PR commits / post
      # comments), which fails with "Resource not accessible by integration" on the
      # default token and on fork PRs. We run the CLI directly instead: it scans the
      # whole git history from the checkout, needs no API access, and behaves identically
      # for same-repo and fork pull requests (important for open-source contributions).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.24.3
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full history
        run: gitleaks detect --source . --redact --no-banner --exit-code 1
