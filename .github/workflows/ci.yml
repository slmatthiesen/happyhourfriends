name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (hermetic unit suites)
        # No DATABASE_URL / API keys on purpose — these suites are pure-logic and must
        # pass without a DB or secrets (see scripts/ci-tests.sh for what's included).
        run: npm test

      - name: Build
        run: npm run build
        env:
          # The db client is lazy (connects only on query), so a dummy URL is enough
          # to let the build resolve config without a live database.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
