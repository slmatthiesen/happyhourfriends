# gitleaks config — extends the full default ruleset, then allowlists our test fixtures.
#
# scripts/fixtures/ holds verbatim captured HTML of real venue websites, used as
# deterministic inputs for the extractor tests. Those pages embed the SITES' OWN public,
# client-side keys (Squarespace context, Google Maps JS key, reCAPTCHA site key) — values
# already shipped to every browser that loads the page, not Happy Hour Friends secrets.
# gitleaks' generic-api-key rule flags them on every full-history scan, so the secret-scan
# job is permanently red over findings that are neither ours nor sensitive.
#
# This narrowly excludes that fixtures directory; the default rules still cover all real
# source, config, and env files.
[extend]
useDefault = true

# ONE [allowlist] block (singular — the pinned CI gitleaks 8.24.3 silently ignores the
# [[allowlists]] plural array form, which unsuppresses everything). Conditions OR by default.
# All entries are content/path-based ON PURPOSE: .gitleaksignore suppressions are keyed on
# commit SHA + line number, so they rot on every history rewrite / line move (the reason the
# same FPs kept re-firing). These key on WHAT the finding is, so they survive both.
#   - scripts/fixtures/: captured third-party venue HTML — sites' OWN public client keys.
#   - REPLACE_ME: placeholder credential sentinels (e.g. infra/budget.tf password), injected
#     out-of-band — never a real secret.
#   - rwg_token=: Google Reserve-with-Google redirect tokens in public restaurant-ordering
#     URLs inside audit-dump JSON — public by construction, not our keys.
[allowlist]
description = "Reviewed false positives — third-party fixtures, placeholder sentinels, public rwg_token URLs"
regexTarget = "match"
paths = [
  '''scripts/fixtures/''',
]
regexes = [
  '''(?i)REPLACE_ME''',
  '''rwg_token=''',
]
